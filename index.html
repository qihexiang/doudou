<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="shortcut icon" href="./16x16.png">
    <link rel="manifest" href="./doudou.manifest.json" />
    <title>豆豆和鸟鸟</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Code Pro', '思源黑体';
        }

        hr {
            width: 80%;
            color: whitesmoke;
        }

        p {
            margin: 1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        #app {
            height: 100vh;
            width: 100vw;
        }

        #avatar {
            margin: 2rem;
            border-radius: 50%;
            box-shadow: 0 0 2rem #FA7366;
        }

        #card {
            min-height: 60vh;
            box-shadow: 0 0 2rem silver;
            border-radius: 2rem;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        #body {
            color: #FFC546;
        }

        #footer {
            color: #FD7CC3;
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1440px) {
            #card {
                font-size: .8vw;
                width: 25vw;
            }

            #avatar {
                width: 8vw;
                height: 8vw;
            }

            .days {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1024px) and (max-width: 1440px) {
            #card {
                font-size: 1.2vw;
                width: 30vw;
            }

            #avatar {
                width: 12vw;
                height: 12vw;
            }

            .days {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (max-width: 1024px) {
            #card {
                font-size: 1.6vw;
                width: 50vw;
            }

            #avatar {
                width: 20vw;
                height: 20vw;
            }

            .days {
                font-size: 10vw;
            }
        }

        @media screen and (max-aspect-ratio: 1/1) and (min-width: 480px) {
            #card {
                font-size: 1.6vh;
                width: 70vw;
            }

            #avatar {
                width: 25vw;
                height: 25vw;
            }

            .days {
                font-size: 10vh;
            }

        }

        @media screen and (max-aspect-ratio: 1/1) and (max-width: 480px) {
            #card {
                font-size: 1.6vh;
                width: 90vw;
            }

            #avatar {
                width: 30vw;
                height: 30vw;
            }

            .days {
                font-size: 10vh;
            }

        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <div id="card" class="container">
            <div id="header" class="container">
                <img id="avatar" src="./256x256.png">
            </div>
            <hr>
            <div id="body" class="container">
                <p>今天是豆豆和鸟鸟在一起的</p>
                <p class="days">第<span id="days"></span>天</p>
                <p>
                    <span id="hours"></span>小时
                    <span id="minutes"></span>分钟
                    <span id="seconds"></span>秒
                    <span id="milliseconds"></span>
                </p>
            </div>
            <hr>
            <div id="footer" class="container">
                <p>2020/11/07 ❤ <span id="now"></span></p>
            </div>
        </div>
</body>

<script>
    const CONSTANT = {
        day: 86400000, hour: 3600000, minute: 60000, second: 1000, millisecond: 1
    }
    const items = ['days', 'hours', 'minutes', 'seconds', 'milliseconds']
    const start = new Date(2020, 10, 7, 21, 0, 0)
    let now = new Date()
    const doc = {}
    items.forEach(item => {
        doc[item] = document.getElementById(item)
    })
    const funcs = {
        days: (future, past) => {
            const passed = future - past
            const days = (passed - passed % CONSTANT.day) / CONSTANT.day + 1
            return String(days)
        },
        hours: (future, past) => {
            const passed = (future - past) % CONSTANT.day
            const hours = (passed - passed % CONSTANT.hour) / CONSTANT.hour
            let result = String(hours);
            if (hours < 10) result = '0' + result
            return result
        },
        minutes: (future, past) => {
            const passed = (future - past) % CONSTANT.day % CONSTANT.hour
            const minutes = (passed - passed % CONSTANT.minute) / CONSTANT.minute
            let result = String(minutes)
            if (minutes < 10) result = '0' + result
            return result
        },
        seconds: (future, past) => {
            const passed = (future - past) % CONSTANT.day % CONSTANT.hour % CONSTANT.minute
            const seconds = (passed - passed % CONSTANT.second) / CONSTANT.second
            let result = String(seconds)
            if (seconds < 10) result = '0' + result
            return result
        },
        milliseconds: (future, past) => {
            const passed = (future - past) % CONSTANT.day % CONSTANT.hour % CONSTANT.minute % CONSTANT.second
            let result = String(passed)
            if (passed < 10) result = '0' + result
            if (passed < 100) result = '0' + result
            return result
        }
    }
    const update = () => {
        now = new Date()
        items.forEach(item => {
            doc[item].innerText = funcs[item](now, start)
        })
        document.getElementById('now').innerText = `${now.getFullYear()}/${now.getMonth() + 1 >= 10 ? now.getMonth() + 1 : '0' + String(now.getMonth() + 1)}/${now.getDate() >= 10 ? now.getDate() : '0' + String(now.getDate())}`
    }
    const anniversary = () => {
        let anni
        if (now <= new Date(now.getFullYear(), 10, 7)) anni = new Date(now.getFullYear(), 10, 7)
        else anni = new Date(now.getFullYear() + 1, 10, 7)
        const lastDays = Number(funcs.days(anni, now)) - 1
        const years = now.getFullYear() - start.getFullYear()
        if (lastDays == 0) {
            const doc = document.createElement('p')
            doc.innerText = `今天是豆豆和鸟鸟的${years}周年纪念日！`
            document.getElementById("footer").append(doc)
        } else if (lastDays <= 14) {
            const doc = document.createElement('p')
            doc.innerHTML = `<strong>还有${lastDays}就是豆豆和鸟鸟的${years}周年纪念日啦！</strong>`
            document.getElementById("footer").append(doc)
        } else {
            const doc = document.createElement('p')
            doc.innerText = `距离豆豆和鸟鸟的${years}周年纪念日还有${lastDays}天！`
            document.getElementById("footer").append(doc)
        }
    }
    const monthly = () => {
        if (now.getDate() == start.getDate()) {
            const fullYearMonths = (now.getFullYear() - start.getFullYear() - 1) * 12
            const restMonths = now.getMonth() + 2
            const doc = document.createElement('p')
            doc.innerText = `鸟鸟和豆豆在一起${fullYearMonths + restMonths}个月啦！`
            document.getElementById("footer").append(doc)
        }
    }
    anniversary()
    monthly()
    setInterval(update, 10)
</script>

</html>
