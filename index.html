<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="豆豆和鸟鸟的日子" />
    <link rel="shortcut icon" href="./32x32.png" />
    <link rel="apple-touch-icon" href="./512x512.png" />
    <link rel="manifest" href="./doudou.manifest.json" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./media.css" />
    <title>豆豆和鸟鸟</title>
</head>

<body>
    <div id="app" class="container">
        <div id="card" class="container">
            <div id="header" class="container">
                <img alt="avatar" id="avatar" src="./512x512.png">
            </div>
            <div id="body" class="container">
                <p>今天是豆豆和鸟鸟在一起的</p>
                <p class="days">第<span id="days"></span>天</p>
                <p>
                    <span id="hours"></span>小时
                    <span id="minutes"></span>分钟
                    <span id="seconds"></span>秒
                    <span id="milliseconds"></span>
                </p>
            </div>
            <div id="footer" class="container">
                <p>2020/11/07 ❤ <span id="now"></span></p>
                <p id="anniversary"></p>
            </div>
        </div>
</body>

<script src="./doudou.js"></script>

</html>
