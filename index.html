<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="shortcut icon" href="./16x16.png">
    <link rel="manifest" href="./doudou.manifest.json" />
    <title>豆豆和鸟鸟</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Code Pro', '思源黑体';
        }

        hr {
            width: 80%;
            color: whitesmoke;
        }

        p {
            margin: 1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        #app {
            height: 100vh;
            width: 100vw;
        }

        #avatar {
            margin: 2rem;
            border-radius: 50%;
            box-shadow: 0 0 2rem #FA7366;
        }

        #card {
            min-height: 60vh;
            box-shadow: 0 0 2rem silver;
            border-radius: 2rem;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        #body {
            color: #FFC546;
        }

        #footer {
            color: #FD7CC3;
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1440px) {
            #card {
                font-size: 1vw;
                width: 25vw;
            }

            #avatar {
                width: 8vw;
                height: 8vw;
            }

            .days {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1024px) and (max-width: 1440px) {
            #card {
                font-size: 1.5vw;
                width: 30vw;
            }

            #avatar {
                width: 12vw;
                height: 12vw;
            }

            .days {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (max-width: 1024px) {
            #card {
                font-size: 2vw;
                width: 50vw;
            }

            #avatar {
                width: 20vw;
                height: 20vw;
            }

            .days {
                font-size: 10vw;
            }
        }

        @media screen and (max-aspect-ratio: 1/1) and (min-width: 480px) {
            #card {
                font-size: 2vh;
                width: 70vw;
            }

            #avatar {
                width: 25vw;
                height: 25vw;
            }

            .days {
                font-size: 10vh;
            }

        }

        @media screen and (max-aspect-ratio: 1/1) and (max-width: 480px) {
            #card {
                font-size: 2vh;
                width: 90vw;
            }

            #avatar {
                width: 30vw;
                height: 30vw;
            }

            .days {
                font-size: 10vh;
            }

        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <div id="card" class="container">
            <div id="header" class="container">
                <img id="avatar" src="./256x256.png">
            </div>
            <hr>
            <div id="body" class="container">
                <p>豆豆和鸟鸟已经在一起：</p>
                <p class="days"><span id="days"></span>天</p>
                <p>
                    <span id="hours"></span>小时
                    <span id="minutes"></span>分钟
                    <span id="seconds"></span>秒
                    <span id="mili"></span></p>
            </div>
            <hr>
            <div id="footer" class="container">
                <p>2020/11/07 ❤ <span id="now"></span></p>
            </div>
        </div>
</body>

<script type="module">
    const start = new Date(2020, 10, 7, 21, 0, 0)
    let now = new Date()
    const daysText = document.getElementById("days")
    const hoursText = document.getElementById("hours")
    const minutesText = document.getElementById("minutes")
    const secondsText = document.getElementById("seconds")
    const miliText = document.getElementById("mili")
    const nowText = document.getElementById("now")
    const update = () => {
        const days = Math.floor((now - start) / (24 * 60 * 60 * 1000)) + 1
        const hours = now.getHours() + 3
        const minutes = now.getMinutes()
        const seconds = now.getSeconds()
        const miliseconds = now.getMilliseconds()
        daysText.innerText = days
        hoursText.innerText = hours >= 10 ? hours : '0' + String(hours)
        minutesText.innerText = minutes >= 10 ? minutes : '0' + String(minutes)
        secondsText.innerText = seconds >= 10 ? seconds : '0' + String(seconds)
        miliText.innerText = miliseconds >= 100 ? miliseconds : (miliseconds >= 10 ? '0' + String(miliseconds) : '00' + String(miliseconds))
        nowText.innerText = `${now.getFullYear()}/${now.getMonth() + 1 >= 10 ? now.getMonth() + 1 : '0' + String(now.getMonth() + 1)}/${now.getDate() >= 10 ? now.getDate() : '0' + String(now.getDate())}`
    }
    update()
    setInterval(() => {
        now = new Date()
        update()
    })
</script>

</html>
