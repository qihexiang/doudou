<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no" />
    <link rel="shortcut icon" href="./16x16.png">
    <link rel="manifest" href="./doudou.manifest.json" />
    <title>豆豆和鸟鸟</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Source Code Pro', '思源黑体';
        }

        hr {
            width: 80%;
            color: silver;
        }

        p {
            margin: 1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: auto;
        }

        #app {
            height: 100vh;
            width: 100vw;
        }

        #avatar {
            margin: 2rem;
            border-radius: 50%;
            box-shadow: 0 0 2rem #FA7366;
        }

        #card {
            min-height: 60vh;
            box-shadow: 0 0 2rem silver;
            border-radius: 2rem;
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        #body {
            color: #FFC546;
        }

        #footer {
            color: #FD7CC3;
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1440px) {
            #card {
                font-size: 1vw;
                width: 25vw;
            }

            #avatar {
                width: 8vw;
                height: 8vw;
            }

            #body {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (min-width: 1024px) and (max-width: 1440px) {
            #card {
                font-size: 1.5vw;
                width: 30vw;
            }

            #avatar {
                width: 12vw;
                height: 12vw;
            }

            #body {
                font-size: 5vw;
            }
        }

        @media screen and (min-aspect-ratio: 1/1) and (max-width: 1024px) {
            #card {
                font-size: 2vw;
                width: 50vw;
            }

            #avatar {
                width: 20vw;
                height: 20vw;
            }

            #body {
                font-size: 10vw;
            }
        }

        @media screen and (max-aspect-ratio: 1/1) and (min-width: 480px) {
            #card {
                font-size: 2vh;
                width: 70vw;
            }

            #avatar {
                width: 25vw;
                height: 25vw;
            }

            #body {
                font-size: 10vh;
            }

        }

        @media screen and (max-aspect-ratio: 1/1) and (max-width: 480px) {
            #card {
                font-size: 2vh;
                width: 90vw;
            }

            #avatar {
                width: 30vw;
                height: 30vw;
            }

            #body {
                font-size: 10vh;
            }

        }
    </style>
</head>

<body>
    <div id="app" class="container">
        <div id="card" class="container">
            <div id="header" class="container">
                <img id="avatar" src="./256x256.png">
            </div>
            <div id="body" class="container">
                <p><span id="counter"></span>天</p>
            </div>
            <div id="footer" class="container">
                <p>2020/11/07 ❤ <span id="now"></span></p>
            </div>
        </div>
</body>

<script type="module">
    const start = new Date("2020-11-07")
    let now = new Date()
    const counterText = document.getElementById("counter")
    const nowText = document.getElementById("now")
    const update = () => {
        counterText.innerText = Math.floor(
            (
                (new Date(
                    now.getFullYear(),
                    now.getMonth(),
                    now.getDate()
                ))
                    .getTime() - start.getTime()
            ) / (24 * 60 * 60 * 1000)
        ) + 1
        const month = (() => {
            const numberMonth = now.getMonth() + 1
            if(numberMonth < 10) return '0' + String(numberMonth)
            else return String(numberMonth)
        })()
        nowText.innerText = `${now.getFullYear()}/${month}/${now.getDate()}`
    }
    update()
    setInterval(() => {
        now = new Date()
        update()
    }, 1000)
</script>

</html>
